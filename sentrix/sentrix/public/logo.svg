<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="48" stroke="white" stroke-width="2" opacity="0.9"/>
  
  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="42" stroke="white" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Monitor/Screen Icon -->
  <g transform="translate(50, 50)">
    <!-- Screen Body -->
    <rect x="-16" y="-12" width="32" height="22" rx="2" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Screen Content Lines -->
    <line x1="-13" y1="-8" x2="13" y2="-8" stroke="white" stroke-width="1.2" opacity="0.9"/>
    <line x1="-13" y1="-4" x2="13" y2="-4" stroke="white" stroke-width="1.2" opacity="0.9"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="white" stroke-width="1.2" opacity="0.9"/>
    
    <!-- Stand -->
    <rect x="-4" y="11" width="8" height="2" fill="white"/>
    <rect x="-0.5" y="13" width="1" height="3" fill="white"/>
  </g>
</svg>
